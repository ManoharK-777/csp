services:
  # Backend Web Service (Node.js - Free Tier)
  - type: web
    name: csp-portal-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22

  # Frontend Static Site (Vite React served via Cloudflare-like CDN)
  - type: web
    name: csp-portal-frontend
    env: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: csp-portal-backend
          property: host
